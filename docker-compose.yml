services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
      - hf_cache:/root/.cache/huggingface
    env_file:
      - .env

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    volumes:
      - ./skills:/app/skills
      - ./data:/app/data
    env_file:
      - .env

volumes:
  hf_cache:
