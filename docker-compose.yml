services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data               # PDFs persist outside the container
      - ./vectorstore:/app/vectorstore # ChromaDB index persists outside the container
    env_file:
      - .env
    depends_on:
      - agent

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    volumes:
      - ./skills:/app/skills           # SKILL.md files (read by agent)
      - ./data:/app/data               # agent writes downloaded PDFs here
    env_file:
      - .env
